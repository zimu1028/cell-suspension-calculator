<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>细胞悬液接种&稀释一体化计算器</title>
    <style>
        /* 基础重置与自适应基础 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, "Microsoft YaHei", BlinkMacSystemFont, sans-serif;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #f5f7fa;
            padding: 10px;
        }
        /* 响应式容器 */
        .container {
            max-width: 580px;
            margin: 0 auto;
            width: 100%;
            padding: 0 5px;
        }
        /* 卡片样式（自适应） */
        .card {
            background: white;
            padding: 20px 15px;
            border-radius: 16px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            width: 100%;
        }
        /* 标题样式 */
        h2 {
            text-align: center;
            color: #333;
            margin: 0 0 20px;
            font-size: clamp(18px, 5vw, 22px);
            font-weight: 600;
        }
        /* 输入项样式 */
        .item {
            margin: 15px 0;
            width: 100%;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: clamp(14px, 4vw, 15px);
        }
        /* 输入框/下拉框自适应 */
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: clamp(15px, 4vw, 16px);
            outline: none;
            transition: border 0.2s;
        }
        input:focus, select:focus {
            border-color: #409eff;
        }
        /* 按钮样式（触控友好） */
        button {
            width: 100%;
            padding: 15px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: clamp(16px, 4vw, 17px);
            font-weight: 500;
            margin-top: 10px;
            cursor: pointer;
            transition: background 0.2s;
            touch-action: manipulation; /* 优化移动端触控 */
        }
        button:hover {
            background: #338eef;
        }
        /* 单位行自适应 */
        .unit-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }
        .unit-row input {
            flex: 2;
        }
        .unit-row select {
            flex: 1;
        }
        /* 提示文字 */
        .tip {
            font-size: clamp(12px, 3vw, 13px);
            color: #999;
            margin-top: 5px;
            line-height: 1.4;
        }
        /* 结果区域自适应 */
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f0f7ff;
            border-radius: 10px;
            font-size: clamp(14px, 4vw, 15px);
            line-height: 1.8;
            width: 100%;
        }
        .result b {
            color: #338eef;
            font-size: clamp(15px, 4vw, 16px);
            font-weight: 600;
        }
        /* 适配小屏手机 */
        @media (max-width: 375px) {
            .card {
                padding: 15px 10px;
            }
            .item {
                margin: 12px 0;
            }
            input, select {
                padding: 10px 12px;
            }
            button {
                padding: 13px;
            }
        }
        /* 适配平板横屏 */
        @media (min-width: 768px) and (max-width: 1024px) {
            .container {
                max-width: 600px;
                padding: 0 20px;
            }
            .card {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>🐬 细胞悬液接种&稀释一体化计算器</h2>

            <!-- 接种基础参数 -->
            <div class="item">
                <label>每孔目标细胞数</label>
                <input type="number" id="cell_per_well" placeholder="例如：8000、10000、12000" step="100">
                <div class="tip">常用：8000/孔（96孔板）、20000/孔（24孔板）</div>
            </div>
            <div class="item">
                <label>每孔接种体积 (μL)</label>
                <input type="number" id="inoculate_vol" placeholder="默认80" value="80">
            </div>
            <div class="item">
                <label>需要接种的孔数</label>
                <input type="number" id="well_count" placeholder="例如：24、48、96" value="24">
                <div class="tip">目标总体积 = 每孔体积 × (孔数+2)（+2为预留余量）</div>
            </div>

            <!-- 原浓度参数 -->
            <div class="item">
                <label>原细胞浓度</label>
                <div class="unit-row">
                    <input type="number" id="c1_num" step="0.01" placeholder="输入数值（如3.73）">
                    <select id="c1_unit">
                        <option value="10000">×10⁴ cells/mL</option>
                        <option value="100000" selected>×10⁵ cells/mL</option>
                        <option value="1000000">×10⁶ cells/mL</option>
                    </select>
                </div>
            </div>

            <button onclick="calcAll()">一键计算全部方案</button>
            <div class="result" id="total_res" style="display: none;"></div>
        </div>
    </div>

<script>
// 一体化计算：先反推浓度，再算稀释方案，自动计算目标总体积
function calcAll() {
    // 1. 获取所有输入参数
    let cell_per_well = parseFloat(document.getElementById('cell_per_well').value);
    let inoculate_vol = parseFloat(document.getElementById('inoculate_vol').value) || 80;
    let well_count = parseFloat(document.getElementById('well_count').value) || 24;
    let c1_num = parseFloat(document.getElementById('c1_num').value);
    let c1_unit = parseFloat(document.getElementById('c1_unit').value);

    // 2. 校验输入有效性
    if (isNaN(cell_per_well) || cell_per_well <= 0) {
        alert('请输入有效的每孔细胞数');
        return;
    }
    if (isNaN(inoculate_vol) || inoculate_vol <= 0) {
        alert('请输入有效的每孔接种体积');
        return;
    }
    if (isNaN(well_count) || well_count <= 0) {
        alert('请输入有效的接种孔数');
        return;
    }
    if (isNaN(c1_num) || c1_num <= 0) {
        alert('请输入有效的原细胞浓度数值');
        return;
    }

    // 3. 计算核心参数
    // 3.1 所需悬液浓度
    let need_conc = (cell_per_well / inoculate_vol) * 1000;
    // 3.2 目标总体积（每孔体积 × (孔数+2)）
    let v_total = inoculate_vol * (well_count + 2);
    // 3.3 原浓度真实值
    let c1_real = c1_num * c1_unit;
    // 3.4 原液体积和培养基体积
    let v1 = (need_conc / c1_real) * v_total;
    let v_medium = v_total - v1;
    // 3.5 稀释倍数
    let dilute_times = (c1_real / need_conc).toFixed(2);

    // 4. 组装结果
    let res = `
        <b>📋 接种参数</b><br>
        每孔细胞数：${cell_per_well.toLocaleString()} 个<br>
        每孔接种体积：${inoculate_vol} μL<br>
        接种孔数：${well_count} 孔（+2孔余量）<br>
        👉 需配置悬液浓度：<b>${need_conc.toLocaleString()} cells/mL</b><br>
        👉 目标总体积：<b>${v_total} μL</b><br>
        <br>
        <b>🧪 稀释方案（直接上枪）</b><br>
        原浓度：${c1_num} ×${(c1_unit/10000).toLocaleString()}⁴ cells/mL（=${c1_real.toLocaleString()} cells/mL）<br>
        稀释倍数：<b>${dilute_times} 倍</b><br>
        ├─ 原细胞悬液：<b>${v1.toFixed(1)} μL</b><br>
        ├─ 加入培养基：<b>${v_medium.toFixed(1)} μL</b><br>
        └─ 混匀后总体积：${v_total} μL
    `;

    // 5. 显示结果
    document.getElementById('total_res').innerHTML = res;
    document.getElementById('total_res').style.display = 'block';
}

// 优化移动端输入体验：点击输入框时自动聚焦
document.querySelectorAll('input').forEach(input => {
    input.addEventListener('touchstart', () => {
        input.focus();
    });
});
</script>
</body>
</html>
